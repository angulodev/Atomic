<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E1116">
<title>Sistema Atómico</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1116; --surface:#161B23; --surface2:#1C232E; --border:#242E3B;
  --text:#E8EDF4; --muted:#8A96A6; --dim:#5A6575;
  --fire:#FB923C; --ok:#34D399;
  --c-ingles:#38BDF8; --c-estudio:#A78BFA; --c-proyectos:#34D399; --c-personal:#FBBF24; --c-salud:#F472B6;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;padding-bottom:76px;min-height:100vh}
h1,h2,h3,.display{font-family:'Archivo',system-ui,sans-serif}
header{padding:18px 16px 8px;max-width:640px;margin:0 auto}
header .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);font-weight:600}
header h1{font-size:24px;font-weight:800;letter-spacing:-.02em}
header h1 .dot{color:var(--fire)}
main{max-width:640px;margin:0 auto;padding:8px 16px 24px}
.tabbar{position:fixed;bottom:0;left:0;right:0;background:rgba(14,17,22,.92);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50}
.tabbar button{background:none;border:none;color:var(--dim);font-family:'Archivo';font-size:11px;font-weight:600;letter-spacing:.02em;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 12px;border-radius:10px}
.tabbar button .ic{font-size:19px;line-height:1}
.tabbar button.active{color:var(--text)}
.tabbar button.active .ic{transform:translateY(-1px)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card h2{font-size:15px;font-weight:700;margin-bottom:12px}
.card h2 small{color:var(--muted);font-weight:500;font-family:'Inter';font-size:12px;margin-left:6px}
/* ---- Hoy ---- */
.today-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.today-head .date{color:var(--muted);font-size:13px;text-transform:capitalize}
.ring{position:relative;width:64px;height:64px}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Archivo';font-weight:800;font-size:15px}
.alert{background:linear-gradient(135deg,rgba(251,146,60,.12),rgba(251,146,60,.04));border:1px solid rgba(251,146,60,.35);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;font-size:13.5px}
.alert b{color:var(--fire)}
.area-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:7px}
.area-label::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--ac)}
.habit{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.habit.done{border-color:color-mix(in srgb,var(--ac) 45%,transparent);background:color-mix(in srgb,var(--ac) 7%,var(--surface))}
.habit .chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;color:#0E1116;transition:all .15s}
.habit.done .chk{background:var(--ac);border-color:var(--ac)}
.habit .info{flex:1;min-width:0}
.habit .name{font-weight:600;font-size:14.5px}
.habit.done .name{opacity:.75}
.habit .cue{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.habit .streak{font-family:'Archivo';font-weight:700;font-size:13px;color:var(--fire);white-space:nowrap}
.habit .streak.zero{color:var(--dim)}
.empty{text-align:center;color:var(--muted);padding:32px 16px;font-size:14px}
.empty .big{font-size:32px;margin-bottom:8px}
/* ---- Heatmap átomos ---- */
.hm-wrap{display:flex;gap:6px;align-items:flex-start}
.dow-col{display:grid;grid-template-rows:repeat(7,1fr);gap:5px}
.dow-lbl{width:12px;height:15px;font-size:9px;font-weight:600;color:var(--dim);display:flex;align-items:center;justify-content:center}
.atoms{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:5px;justify-content:start;overflow-x:auto;padding-bottom:4px;flex:1}
.atom{width:15px;height:15px;border-radius:50%;background:var(--surface2);flex-shrink:0}
.atoms-legend{display:flex;gap:6px;align-items:center;margin-top:10px;font-size:11px;color:var(--dim)}
.atoms-legend .atom{width:9px;height:9px}
/* ---- Calendario ---- */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head .cm{font-family:'Archivo';font-weight:700;font-size:14px;text-transform:capitalize}
.cal-head button{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:9px;width:34px;height:34px;font-size:16px;cursor:pointer}
.cal-head button:disabled{opacity:.3}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--dim);padding:2px 0}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:600;background:var(--surface2);color:var(--muted);cursor:pointer;position:relative}
.cal-day.blank{background:none;cursor:default}
.cal-day.future{opacity:.28;cursor:default}
.cal-day.today{outline:2px solid var(--fire);outline-offset:1px;color:var(--text)}
.cal-day.rest{background:rgba(56,189,248,.16);color:var(--c-ingles)}
.day-nav{display:flex;gap:8px;margin-top:12px}
.day-nav button{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:9px 0;font-size:12.5px;font-weight:600;cursor:pointer}
/* ---- Métricas ---- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stat .num{font-family:'Archivo';font-weight:800;font-size:26px;letter-spacing:-.02em}
.stat .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.bars{display:flex;align-items:flex-end;gap:8px;height:110px;padding-top:8px}
.bar-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:34px;border-radius:6px 6px 3px 3px;background:linear-gradient(180deg,var(--fire),#c2632a);min-height:3px}
.bar-w span{font-size:10px;color:var(--dim)}
.hstat{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.hstat:last-child{border-bottom:none}
.hstat .dotc{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hstat .n{flex:1;font-size:13.5px;font-weight:500;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hstat .v{font-size:12.5px;color:var(--muted);white-space:nowrap}
.hstat .v b{color:var(--text);font-family:'Archivo'}
/* ---- Forms ---- */
label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px}
input[type=text],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-family:'Inter';font-size:14px}
textarea{resize:vertical;min-height:70px}
input:focus,textarea:focus,select:focus{outline:2px solid var(--fire);outline-offset:0;border-color:transparent}
.days{display:flex;gap:6px}
.days button{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:8px 0;font-size:12px;font-weight:600;cursor:pointer}
.days button.on{background:var(--fire);border-color:var(--fire);color:#0E1116}
.btn{display:block;width:100%;background:var(--fire);color:#0E1116;border:none;border-radius:12px;padding:13px;font-family:'Archivo';font-weight:700;font-size:14.5px;cursor:pointer;margin-top:16px}
.btn.ghost{background:none;border:1px solid var(--border);color:var(--muted);margin-top:8px}
.btn.danger{background:none;border:1px solid rgba(248,113,113,.4);color:#F87171;margin-top:8px}
.row-actions{display:flex;gap:8px}
.row-actions .btn{margin-top:8px}
.chip{display:inline-block;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:var(--surface2);color:var(--muted)}
.hlist-item{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer}
.hlist-item:last-child{border-bottom:none}
.hlist-item .dotc{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hlist-item .meta{flex:1;min-width:0}
.hlist-item .meta .n{font-weight:600;font-size:14px}
.hlist-item .meta .s{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ---- Archivados ---- */
details.arch summary{cursor:pointer;font-family:'Archivo';font-weight:700;font-size:14px;color:var(--muted);list-style:none;display:flex;align-items:center;gap:8px}
details.arch summary::before{content:'▸';transition:transform .15s}
details.arch[open] summary::before{transform:rotate(90deg)}
.arch-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.arch-item:last-child{border-bottom:none}
.arch-item .n{flex:1;font-size:13.5px;color:var(--muted);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.mini.red{color:#F87171;border-color:rgba(248,113,113,.35)}
/* ---- Modal ---- */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:640px;max-height:88vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:4px}
.modal .sub{font-size:13px;color:var(--muted)}
/* ---- Revisión ---- */
.review-item{padding:13px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-item .wk{font-family:'Archivo';font-weight:700;font-size:13.5px;display:flex;justify-content:space-between}
.review-item .wk .sc{color:var(--fire)}
.review-item p{font-size:13px;color:var(--muted);margin-top:4px;white-space:pre-wrap}
.score-row{display:flex;gap:6px;margin-top:4px}
.score-row button{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:9px;padding:9px 0;font-family:'Archivo';font-weight:700;cursor:pointer}
.score-row button.on{background:var(--fire);border-color:var(--fire);color:#0E1116}
.identity-quote{font-size:13px;color:var(--muted);font-style:italic;border-left:3px solid var(--fire);padding-left:12px;margin:4px 0 14px}
/* ---- Metas / examen ---- */
.exam{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.exam .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.exam .top h3{font-size:15.5px;font-weight:700}
.exam .cd{font-family:'Archivo';font-weight:800;color:var(--fire);font-size:14px;white-space:nowrap}
.exam .cd.late{color:#F87171}
.pbar{height:7px;background:var(--surface2);border-radius:99px;margin:12px 0;overflow:hidden}
.pbar div{height:100%;background:linear-gradient(90deg,var(--fire),#FBBF24);border-radius:99px}
.topic{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer}
.topic .tchk{width:20px;height:20px;border-radius:6px;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#0E1116}
.topic.done .tchk{background:var(--ok);border-color:var(--ok)}
.topic.done .tt{opacity:.55;text-decoration:line-through}
.topic .tt{font-size:13.5px;flex:1}
.add-topic{display:flex;gap:8px;margin-top:10px}
.add-topic input{flex:1}
.add-topic button{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:0 16px;font-weight:700;cursor:pointer}
/* ---- Votos de identidad ---- */
.vote{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13.5px}
.vote .vn{font-family:'Archivo';font-weight:800;color:var(--fire);min-width:34px;text-align:right}
.vote .vt{color:var(--muted)}
.vote .vt b{color:var(--text);font-weight:600}
/* ---- Descanso ---- */
.rest-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;margin-bottom:12px}
.rest-chip.on{background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.4);color:var(--c-ingles)}
/* ---- Datos ---- */
.data-note{font-size:12.5px;color:var(--muted);margin-bottom:4px}
input[type=number]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-family:'Inter';font-size:14px}
.habit .note-line{font-size:11.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ---- Logros ---- */
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.badge{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center}
.badge .be{font-size:22px}
.badge .bn{font-size:10.5px;font-weight:600;color:var(--muted);margin-top:3px;line-height:1.25}
.badge.locked{opacity:.32;filter:grayscale(1)}
.badge.ok{border-color:rgba(251,146,60,.45)}
/* ---- Bitácora ---- */
.bit-entry{padding:10px 0;border-bottom:1px solid var(--border)}
.bit-entry:last-child{border-bottom:none}
.bit-entry .bh{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
.bit-entry .bh .dotc{width:7px;height:7px;border-radius:50%}
.bit-entry .bh b{color:var(--text);font-weight:600}
.bit-entry .bh .bm{margin-left:auto;font-family:'Archivo';font-weight:700;color:var(--fire);white-space:nowrap}
.bit-entry p{font-size:13px;margin-top:3px}
.minarea{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13.5px}
.minarea .dotc{width:8px;height:8px;border-radius:50%}
.minarea .mn{margin-left:auto;font-family:'Archivo';font-weight:700}
.atom[data-day]{cursor:pointer}
.habit.rest{border-color:rgba(56,189,248,.4);background:rgba(56,189,248,.05)}
.habit.rest .chk{border-color:rgba(56,189,248,.6);border-style:dashed}
.habit.rest .name{opacity:.7}
/* ---- Onboarding ---- */
.ob-step{text-align:center;padding:12px 4px}
.ob-step .ob-icon{font-size:44px;margin-bottom:10px}
.ob-step h3{font-size:19px;margin-bottom:8px}
.ob-step p{font-size:14px;color:var(--muted);line-height:1.55}
.ob-laws{text-align:left;margin-top:14px}
.ob-laws div{display:flex;gap:10px;padding:7px 0;font-size:13.5px;color:var(--muted)}
.ob-laws div b{color:var(--text)}
.ob-dots{display:flex;justify-content:center;gap:7px;margin:16px 0 4px}
.ob-dots span{width:7px;height:7px;border-radius:50%;background:var(--surface2)}
.ob-dots span.on{background:var(--fire)}
/* ---- Plantillas ---- */
.tpl-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tpl{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:99px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
.tpl:active{border-color:var(--fire);color:var(--text)}
/* ---- Pendientes ---- */
.task{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.task:last-child{border-bottom:none}
.task .tchk{width:22px;height:22px;border-radius:7px;border:2px solid var(--dim);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#0E1116}
.task.done .tchk{background:var(--ok);border-color:var(--ok)}
.task .tt{flex:1;font-size:14px;min-width:0}
.task.done .tt{opacity:.5;text-decoration:line-through}
.task .due{font-size:11.5px;color:var(--dim);white-space:nowrap}
.task .due.over{color:#F87171;font-weight:600}
.task .due.today{color:var(--fire);font-weight:600}
.add-task{display:flex;gap:8px;margin-top:12px}
.add-task input[type=text]{flex:1}
.add-task input[type=date]{width:44px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--muted);padding:0 4px;font-family:'Inter';font-size:12px}
.add-task button{background:var(--fire);border:none;color:#0E1116;border-radius:10px;padding:0 16px;font-weight:800;font-size:18px;cursor:pointer}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="eyebrow">1% mejor cada día</div>
  <h1>Sistema Atómico<span class="dot">.</span></h1>
</header>
<main id="app"></main>
<nav class="tabbar" id="tabbar"></nav>
<div id="modal-root"></div>
<script>
/* ================= Storage adapter =================
   Usa window.storage (Claude artifacts) si existe;
   si no, localStorage (GitHub Pages / PWA). */
const Store = {
  async get(k){
    try{
      if(window.storage){ try{ const r=await window.storage.get(k); return r?JSON.parse(r.value):null }catch(e){ return null } }
      const v=localStorage.getItem(k); return v?JSON.parse(v):null;
    }catch(e){ return null }
  },
  async set(k,v){
    try{
      if(window.storage){ await window.storage.set(k,JSON.stringify(v)); return }
      localStorage.setItem(k,JSON.stringify(v));
    }catch(e){}
  }
};

/* ================= Estado ================= */
const AREAS = {
  ingles:{name:'Idiomas',color:'var(--c-ingles)',hex:'#38BDF8'},
  estudio:{name:'Estudio',color:'var(--c-estudio)',hex:'#A78BFA'},
  proyectos:{name:'Proyectos',color:'var(--c-proyectos)',hex:'#34D399'},
  personal:{name:'Personal',color:'var(--c-personal)',hex:'#FBBF24'},
  salud:{name:'Salud',color:'var(--c-salud)',hex:'#F472B6'}
};
const DOW = ['L','M','X','J','V','S','D']; // lunes=0 interno
let state = { habits:[], logs:{}, reviews:[], exams:[], restDays:{} };
let tab = 'hoy';
const TABS=['hoy','habitos','metas','metricas','revision'];
window.addEventListener('hashchange',()=>{
  const t=location.hash.slice(1);
  if(TABS.includes(t)&&t!==tab){ tab=t; render(); window.scrollTo(0,0) }
});

function uid(){ return Math.random().toString(36).slice(2,10) }
function todayKey(d=new Date()){ const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}` }
function dowIdx(d){ return (d.getDay()+6)%7 } // lunes=0
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x }
function fmtDate(d){ return d.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'}) }
function weekKey(d=new Date()){ const x=addDays(d,-dowIdx(d)); return todayKey(x) }

async function load(){
  const s = await Store.get('sistema-atomico-v1');
  if(s){ state = s }
  state.exams = state.exams || [];
  state.restDays = state.restDays || {};
  state.tasks = state.tasks || [];
  const t0=location.hash.slice(1);
  if(TABS.includes(t0)) tab=t0;
  render();
  if(!state.habits.length && !state.onboarded) openOnboarding();
}

const TEMPLATES = [
  {name:'Leer 10 páginas',area:'personal',identity:'un lector constante',cue:'Antes de dormir',days:[0,1,2,3,4,5,6]},
  {name:'Ejercicio · 20 min',area:'salud',identity:'alguien activo',cue:'Después de despertar',days:[0,1,2,3,4]},
  {name:'Estudiar idioma · 15 min',area:'ingles',identity:'alguien que domina otro idioma',cue:'Después del café de la mañana',days:[0,1,2,3,4,5,6]},

/* ================= Lógica ================= */
function scheduledOn(h,date){ return !h.archived && h.days.includes(dowIdx(date)) }
function isRest(date){ return !!state.restDays[todayKey(date)] }
function isHabitRest(h,key){ const e=state.logs[key]&&state.logs[key][h.id]; return !!(e&&e.rest) }
function schedActive(h,date){ return scheduledOn(h,date) && !isRest(date) && !isHabitRest(h,todayKey(date)) } // descanso (global o por hábito) no rompe rachas
function isDone(h,key){ return !!(state.logs[key] && state.logs[key][h.id] && state.logs[key][h.id].done) }
function streak(h){
  let s=0, d=new Date();
  // si hoy está agendado pero aún no hecho, no rompe la racha: parte desde ayer
  if(schedActive(h,d) && !isDone(h,todayKey(d))) d=addDays(d,-1);
  for(let i=0;i<730;i++){
    if(schedActive(h,d)){
      if(isDone(h,todayKey(d))) s++;
      else break;
    }
    d=addDays(d,-1);
  }
  return s;
}
function bestStreak(h){
  let best=0,cur=0,d=addDays(new Date(),-365);
  for(let i=0;i<=365;i++){
    if(schedActive(h,d)){
      if(isDone(h,todayKey(d))){cur++;best=Math.max(best,cur)}else cur=0;
    }
    d=addDays(d,1);
  }
  return Math.max(best,streak(h));
}
function pct30(h){
  let sch=0,done=0,d=addDays(new Date(),-29);
  for(let i=0;i<30;i++){
    if(schedActive(h,d)){sch++; if(isDone(h,todayKey(d)))done++}
    d=addDays(d,1);
  }
  return sch?Math.round(done/sch*100):0;
}
function dayCompletion(date){
  if(isRest(date)) return null;
  const k=todayKey(date);
  const hs=state.habits.filter(h=>scheduledOn(h,date)&&!isHabitRest(h,k));
  if(!hs.length) return null;
  const done=hs.filter(h=>isDone(h,k)).length;
  return done/hs.length;
}
function missedYesterdayTwice(){
  // hábitos que fallaron ayer Y anteayer → alerta "nunca falles dos veces"
  const y=addDays(new Date(),-1), y2=addDays(new Date(),-2);
  return state.habits.filter(h=>
    schedActive(h,y)&&!isDone(h,todayKey(y)) &&
    schedActive(h,y2)&&!isDone(h,todayKey(y2))
  );
}
function missedYesterday(){
  const y=addDays(new Date(),-1);
  return state.habits.filter(h=>schedActive(h,y)&&!isDone(h,todayKey(y)));
}
function identityVotes(){
  // votos de esta semana (lunes→hoy) agrupados por identidad
  const ws=addDays(new Date(),-dowIdx(new Date()));
  const votes={};
  state.habits.forEach(h=>{
    if(!h.identity) return;
    for(let i=0;i<7;i++){
      const d=addDays(ws,i); if(d>new Date())break;
      if(isDone(h,todayKey(d))) votes[h.identity]=(votes[h.identity]||0)+1;
    }
  });
  return Object.entries(votes).sort((a,b)=>b[1]-a[1]);
}

function viewHoy(){
  const today=new Date(), key=todayKey(today);
  const rest=isRest(today);
  const hs=state.habits.filter(h=>scheduledOn(h,today));
  const active=hs.filter(h=>!isHabitRest(h,key));
  const done=active.filter(h=>isDone(h,key)).length;
  const pct=active.length?Math.round(done/active.length*100):0;
  const circ=2*Math.PI*26;
  const twice=rest?[]:missedYesterdayTwice();
  const missed=rest?[]:missedYesterday().filter(h=>!twice.includes(h));

  let alerts='';
  if(totalAtoms()>0 && daysSince(state.lastBackup)>=7) alerts+=`<div class="alert" style="border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.06)">💾 <b style="color:var(--ok)">Hora de respaldar.</b> ${state.lastBackup?'Tu último backup fue hace '+daysSince(state.lastBackup)+' días.':'Aún no has hecho un backup.'} <u data-export="1" style="cursor:pointer">Exportar ahora</u></div>`;

  else if(twice.length) alerts+=`<div class="alert">🔥 <b>Nunca falles dos veces.</b> Llevas 2 días sin: ${twice.map(h=>h.name).join(', ')}. Hoy es el día para retomar — aunque sea la versión de 2 minutos.</div>`;
  else if(missed.length) alerts+=`<div class="alert">Ayer se te escapó: <b>${missed.map(h=>h.name).join(', ')}</b>. Un fallo es un accidente; dos es el inicio de un nuevo hábito. Hoy no falles.</div>`;

  const byArea={};
  hs.forEach(h=>{ (byArea[h.area]=byArea[h.area]||[]).push(h) });

  let list='';
  for(const [a,arr] of Object.entries(byArea)){
    list+=`<div class="area-label" style="--ac:${AREAS[a].color};color:${AREAS[a].color}">${AREAS[a].name}</div>`;
    list+=arr.map(h=>{
      const e=(state.logs[key]||{})[h.id]||{};
      const d=!!e.done, rst=!!e.rest, s=streak(h);
      const extra=d&&(e.min||e.note)?`<div class="note-line">${e.min?e.min+' min':''}${e.min&&e.note?' · ':''}${esc(e.note||'')}</div>`:'';
      return `<div class="habit ${d?'done':''} ${rst?'rest':''}" style="--ac:${AREAS[h.area].color}" data-toggle="${h.id}">
        <div class="chk">${d?'✓':rst?'🛌':''}</div>
        <div class="info"><div class="name">${esc(h.name)}</div><div class="cue">${rst?'Descansando hoy · la racha se mantiene':esc(h.cue||'')}</div>${extra}</div>
        <div class="streak ${s?'':'zero'}">${s?'🔥 '+s:'—'}</div>
      </div>`;
    }).join('');
  }
  if(!hs.length) list=`<div class="empty"><div class="big">⚛️</div>No hay hábitos agendados hoy.<br>Crea uno en la pestaña Hábitos.</div>`;

  const votes=identityVotes();
  const votesCard=votes.length?`<div class="card"><h2>Votos de identidad <small>esta semana</small></h2>
    ${votes.map(([id,n])=>`<div class="vote"><span class="vn">${n}×</span><span class="vt">por ser <b>${esc(id)}</b></span></div>`).join('')}
  </div>`:'';

  const pend=state.tasks.filter(t=>!t.done).sort((a,b)=>(a.due||'9999')<(b.due||'9999')?-1:1);
  const doneTasks=state.tasks.filter(t=>t.done);
  const tKey=todayKey();
  const taskRow=t=>{
    let due='';
    if(t.due){
      const cls=t.due<tKey?'over':t.due===tKey?'today':'';
      const lbl=t.due<tKey?'venció '+t.due:t.due===tKey?'vence hoy':t.due;
      due=`<span class="due ${cls}">${lbl}</span>`;
    }
    return `<div class="task ${t.done?'done':''}" data-task="${t.id}"><div class="tchk">${t.done?'✓':''}</div><div class="tt">${esc(t.t)}</div>${due}</div>`;
  };
  const tasksCard=`<div class="card" style="margin-top:14px">
    <h2>Pendientes <small>cosas de una sola vez</small></h2>
    ${pend.map(taskRow).join('')||(doneTasks.length?'':'<div class="empty" style="padding:14px">Nada pendiente. Agrega lo que no puede olvidarse.</div>')}
    ${doneTasks.length?`<details class="arch" style="margin-top:8px"><summary>Completados (${doneTasks.length})</summary><div style="margin-top:6px">${doneTasks.map(taskRow).join('')}</div><button class="mini red" data-cleartasks="1" style="margin-top:10px">Borrar completados</button></details>`:''}

      <input type="date" id="task-due" title="Fecha límite (opcional)">
      <button data-addtask="1">+</button>

  return `
  <div class="card">
    <div class="today-head">

        <h2 style="margin-bottom:2px">Hoy <small>${done}/${active.length} completados${hs.length>active.length?' · '+(hs.length-active.length)+' en descanso':''}</small></h2>

      <div class="ring">
        <svg width="64" height="64"><circle cx="32" cy="32" r="26" fill="none" stroke="var(--surface2)" stroke-width="6"/>
        <circle cx="32" cy="32" r="26" fill="none" stroke="var(--fire)" stroke-width="6" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct/100)}"/></svg>

  <button class="rest-chip ${rest?'on':''}" data-rest="1">🛌 ${rest?'Hoy es día de descanso · tocar para desmarcar':'Marcar hoy como descanso'}</button>
  ${alerts}
  ${list}
  ${tasksCard}
  ${votesCard}`;
}

let calOffset=0;
function calendarHTML(){
  const base=new Date(); base.setDate(1); base.setHours(0,0,0,0);
  base.setMonth(base.getMonth()+calOffset);
  const monthName=base.toLocaleDateString('es-CL',{month:'long',year:'numeric'});
  const firstDow=dowIdx(base);
  const daysInMonth=new Date(base.getFullYear(),base.getMonth()+1,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);
  const tKey=todayKey(today);
  let cells=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDow;i++) cells+=`<div class="cal-day blank"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const d=new Date(base.getFullYear(),base.getMonth(),day);
    const key=todayKey(d);
    const future=d>today;
    const rest=!future&&isRest(d);
    const comp=future?null:dayCompletion(d);
    let style='';
    if(comp!==null&&comp>0) style=`background:rgba(251,146,60,${(.2+comp*.65).toFixed(2)});color:${comp>=.7?'#0E1116':'var(--text)'};${comp>=.7?'background:var(--fire);':''}`;
    cells+=`<div class="cal-day ${future?'future':''} ${key===tKey?'today':''} ${rest?'rest':''}" ${future?'':`data-day="${key}"`} style="${style}">${day}</div>`;
  }
  return `
  <div class="cal-head">
    <button data-calprev="1">‹</button>
    <span class="cm">${monthName}</span>
    <button data-calnext="1" ${calOffset>=0?'disabled':''}>›</button>
  </div>
  <div class="cal-grid">${cells}</div>
  <div class="day-nav">
    <button data-yesterday="1">🕐 Registrar ayer</button>
    <button data-pickday="1">📅 Elegir otro día</button>
    <input type="date" id="day-pick" max="${todayKey()}" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0">
  </div>`;
}

function viewMetricas(){

  const totalStreak=act.reduce((m,h)=>Math.max(m,streak(h)),0);

  const avg30=act.length?Math.round(act.reduce((s,h)=>s+pct30(h),0)/act.length):0;
  // barras: 8 semanas
  let bars='';
  for(let w=7;w>=0;w--){
    const ws=addDays(new Date(),-dowIdx(new Date())-w*7);
    let sch=0,done=0;
    for(let i=0;i<7;i++){

    <button class="btn" id="f-save">Guardar hábito</button>
    ${isNew?'':'<button class="btn danger" id="f-del">Archivar hábito</button>'}
    <button class="btn ghost" id="f-cancel">Cancelar</button>
  </div></div>`;
  const days=new Set(h.days);
  function syncDays(){
    root.querySelectorAll('#f-days button').forEach(b=>b.classList.toggle('on',days.has(+b.dataset.d)));
  }
  root.querySelectorAll('[data-tpl]').forEach(b=>b.onclick=()=>{

    root.querySelector('#f-name').value=t.name;
    root.querySelector('#f-area').value=t.area;
    root.querySelector('#f-identity').value=t.identity;
    root.querySelector('#f-cue').value=t.cue;
    days.clear(); t.days.forEach(d=>days.add(d)); syncDays();
  });
  root.querySelectorAll('#f-days button').forEach(b=>b.onclick=()=>{
    const d=+b.dataset.d; days.has(d)?days.delete(d):days.add(d); b.classList.toggle('on');
  });
  root.querySelector('#f-save').onclick=async()=>{
    h.name=root.querySelector('#f-name').value.trim();
    if(!h.name)return;
    h.area=root.querySelector('#f-area').value;
    h.identity=root.querySelector('#f-identity').value.trim();
    h.cue=root.querySelector('#f-cue').value.trim();
    h.days=[...days].sort();
    if(isNew) state.habits.push(h);
    await save(); closeModal(); render();
  };
  const del=root.querySelector('#f-del');
  if(del) del.onclick=async()=>{ h.archived=true; await save(); closeModal(); render(); };
  root.querySelector('#f-cancel').onclick=closeModal;
  root.querySelector('#mbg').onclick=e=>{if(e.target.id==='mbg')closeModal()};
}

function openCheckModal(h,key){
  key=key||todayKey();
  const isToday=key===todayKey();
  const e=(state.logs[key]||{})[h.id]||{};
  const done=!!e.done, rst=!!e.rest;
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-bg" id="mbg"><div class="modal">
    <h3>${esc(h.name)}</h3>
    <div class="sub">${isToday?'':'📅 '+key+' · '}${rst?'🛌 En descanso — la racha se mantiene.':h.identity?`Un voto más por ser <b style="color:var(--fire)">${esc(h.identity)}</b>.`:''}</div>
    <label>Minutos (opcional)</label>
    <input type="number" id="c-min" min="0" value="${e.min||''}" placeholder="15">
    <label>Nota — ¿qué avanzaste? (opcional)</label>
    <textarea id="c-note" placeholder="Ej: capítulo 3, tema nuevo, repaso…">${esc(e.note||'')}</textarea>
    <button class="btn" id="c-save">${done?'Guardar cambios':'Marcar como hecho ✓'}</button>
    <button class="btn ghost" id="c-rest" style="border-color:rgba(56,189,248,.4);color:var(--c-ingles)">🛌 ${rst?'Quitar descanso':'Descanso solo en este hábito'}</button>
    ${done?'<button class="btn danger" id="c-undo">Desmarcar</button>':''}
    <button class="btn ghost" id="c-cancel">Cancelar</button>
  </div></div>`;
  root.querySelector('#c-save').onclick=async()=>{
    const min=parseInt(root.querySelector('#c-min').value)||0;
    const note=root.querySelector('#c-note').value.trim();
    state.logs[key]=state.logs[key]||{};
    state.logs[key][h.id]={done:true,...(min?{min}:{}),...(note?{note}:{})};
    await save(); closeModal(); render();
  };
  root.querySelector('#c-rest').onclick=async()=>{
    state.logs[key]=state.logs[key]||{};
    if(rst) delete state.logs[key][h.id];
    else state.logs[key][h.id]={rest:true};
    await save(); closeModal(); render();
  };
  const undo=root.querySelector('#c-undo');
  if(undo) undo.onclick=async()=>{
    if(state.logs[key]) delete state.logs[key][h.id];
    await save(); closeModal(); render();
  };
  root.querySelector('#c-cancel').onclick=closeModal;
  root.querySelector('#mbg').onclick=ev=>{if(ev.target.id==='mbg')closeModal()};
}

function exportData(){

  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`atomico-backup-${todayKey()}.json`;

function totalAtoms(){
  let n=0; Object.values(state.logs).forEach(day=>Object.values(day).forEach(e=>{if(e.done)n++}));
  return n;
}
function daysSince(key){
  if(!key) return Infinity;
  return Math.floor((new Date()-new Date(key+'T00:00:00'))/86400000);
}
function bitacoraEntries(q){
  q=(q||'').toLowerCase();
  const out=[];
  Object.keys(state.logs).sort().reverse().forEach(day=>{
    Object.entries(state.logs[day]).forEach(([hid,e])=>{
      if(!e.done||(!e.min&&!e.note))return;
      const h=state.habits.find(x=>x.id===hid); if(!h)return;
      if(q && !((e.note||'').toLowerCase().includes(q)||h.name.toLowerCase().includes(q)))return;
      out.push({day,h,e});
    });
  });
  return out.slice(0,30);
}
function bitacoraListHTML(q){
  const es=bitacoraEntries(q);
  if(!es.length) return `<div class="empty">${q?'Sin resultados para esa búsqueda.':'Aún no hay registros con minutos o notas. Al marcar un hábito, anota qué avanzaste.'}</div>`;
  return es.map(({day,h,e})=>`
    <div class="bit-entry">
      <div class="bh"><div class="dotc" style="background:${AREAS[h.area].color}"></div><b>${esc(h.name)}</b><span>· ${day}</span>${e.min?`<span class="bm">${e.min} min</span>`:''}</div>
      ${e.note?`<p>${esc(e.note)}</p>`:''}
    </div>`).join('');
}
function weekMinutesByArea(){
  const ws=addDays(new Date(),-dowIdx(new Date()));
  const tot={};
  for(let i=0;i<7;i++){
    const d=addDays(ws,i); if(d>new Date())break;
    const day=state.logs[todayKey(d)]||{};
    Object.entries(day).forEach(([hid,e])=>{
      if(!e.done||!e.min)return;
      const h=state.habits.find(x=>x.id===hid); if(!h)return;
      tot[h.area]=(tot[h.area]||0)+e.min;
    });
  }
  return tot;
}
function achievements(){
  const best=state.habits.length?Math.max(...state.habits.map(h=>bestStreak(h))):0;
  const atoms=totalAtoms();
  const revs=state.reviews.length;
  const examDone=state.exams.some(ex=>ex.topics.length&&ex.topics.every(t=>t.done));
  return [
    {e:'🔥',n:'Racha de 7',ok:best>=7},
    {e:'🌋',n:'Racha de 30',ok:best>=30},
    {e:'🏆',n:'Racha de 100',ok:best>=100},
    {e:'⚛️',n:'10 átomos',ok:atoms>=10},
    {e:'💫',n:'100 átomos',ok:atoms>=100},
    {e:'🌌',n:'500 átomos',ok:atoms>=500},
    {e:'🧭',n:'1ª revisión',ok:revs>=1},
    {e:'🗺️',n:'5 revisiones',ok:revs>=5},
    {e:'💾',n:'Backup hecho',ok:!!state.lastBackup},
    {e:'🎯',n:'Meta completada',ok:examDone}
  ];
}
async function shareImage(){
  const c=document.createElement('canvas'); c.width=1080; c.height=1080;
  const x=c.getContext('2d');
  x.fillStyle='#0E1116'; x.fillRect(0,0,1080,1080);
  x.fillStyle='#5A6575'; x.font='600 28px sans-serif'; x.fillText('1% MEJOR CADA DÍA',80,120);
  x.fillStyle='#E8EDF4'; x.font='800 72px sans-serif'; x.fillText('Sistema Atómico',80,210);
  x.fillStyle='#FB923C'; x.fillText('.',x.measureText('Sistema Atómico').width+80,210);
  // stats
  const act=state.habits.filter(h=>!h.archived);
  const best=act.length?Math.max(...act.map(h=>streak(h))):0;
  const avg=act.length?Math.round(act.reduce((s,h)=>s+pct30(h),0)/act.length):0;
  const stats=[[`🔥 ${best}`,'racha activa'],[`⚛️ ${totalAtoms()}`,'átomos'],[`${avg}%`,'últimos 30 días']];
  stats.forEach(([v,l],i)=>{
    const sx=80+i*320;
    x.fillStyle='#E8EDF4'; x.font='800 64px sans-serif'; x.fillText(v,sx,360);
    x.fillStyle='#8A96A6'; x.font='500 26px sans-serif'; x.fillText(l,sx,405);
  });
  // heatmap 12 semanas
  const weeks=12, cell=64, r=22, ox=80, oy=500;
  const today=new Date(), end=addDays(today,6-dowIdx(today)), start=addDays(end,-(weeks*7-1));
  for(let i=0;i<weeks*7;i++){
    const d=addDays(start,i);
    if(d>today)continue;
    const col=Math.floor(i/7), row=i%7;
    const comp=dayCompletion(d);
    x.beginPath();
    x.arc(ox+col*cell+r,oy+row*cell+r,r,0,Math.PI*2);
    if(comp!==null&&comp>0){ x.globalAlpha=.25+comp*.75; x.fillStyle='#FB923C' }
    else { x.globalAlpha=1; x.fillStyle='#1C232E' }
    x.fill(); x.globalAlpha=1;
  }
  x.fillStyle='#5A6575'; x.font='500 26px sans-serif';
  x.fillText('últimas 12 semanas · construido con constancia',80,1020);
  const blob=await new Promise(res=>c.toBlob(res,'image/png'));
  const file=new File([blob],'progreso-atomico.png',{type:'image/png'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file],title:'Mi progreso'}); return }catch(e){}
  }
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='progreso-atomico.png'; a.click();
  URL.revokeObjectURL(a.href);
}
function importData(file){
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const d=JSON.parse(r.result);
      if(!Array.isArray(d.habits)) throw new Error('formato inválido');
      if(!confirm(`Importar backup con ${d.habits.length} hábitos. Esto REEMPLAZA todos los datos actuales. ¿Continuar?`))return;
      state={habits:d.habits,logs:d.logs||{},reviews:d.reviews||[],exams:d.exams||[],restDays:d.restDays||{}};
      await save(); render();
      alert('Backup importado ✓');
    }catch(err){ alert('No se pudo leer el archivo: '+err.message) }
  };
  r.readAsText(file);
}

/* ================= Eventos ================= */
function bindEvents(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{
    const t=b.dataset.tab;
    if(t===tab) return;
    location.hash='#'+t; // hashchange dispara el render
  });
  document.querySelectorAll('[data-toggle]').forEach(el=>el.onclick=()=>{
    const h=state.habits.find(x=>x.id===el.dataset.toggle);
    if(h) openCheckModal(h);
  });
  const rc=document.querySelector('[data-rest]');
  if(rc) rc.onclick=async()=>{
    const k=todayKey();
    if(state.restDays[k]) delete state.restDays[k]; else state.restDays[k]=true;
    await save(); render();
  };
  document.querySelectorAll('[data-edit]').forEach(el=>el.onclick=()=>{
    openHabitModal(state.habits.find(h=>h.id===el.dataset.edit));
  });
  const nb=document.querySelector('[data-new]'); if(nb)nb.onclick=()=>openHabitModal(null);
  document.querySelectorAll('[data-restore]').forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    const h=state.habits.find(x=>x.id===b.dataset.restore);
    if(h){h.archived=false; await save(); render()}
  });
  document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    const h=state.habits.find(x=>x.id===b.dataset.delete);
    if(!h)return;
    if(!confirm(`¿Eliminar "${h.name}" definitivamente? Se borra también su historial de checks. Esto no se puede deshacer.`))return;
    state.habits=state.habits.filter(x=>x.id!==h.id);
    Object.values(state.logs).forEach(day=>{ delete day[h.id] });
    await save(); render();
  });
  const rb=document.querySelector('[data-review]'); if(rb)rb.onclick=openReviewModal;
  // Metas
  const ne=document.querySelector('[data-newexam]'); if(ne)ne.onclick=openExamModal;
  document.querySelectorAll('[data-topic]').forEach(el=>el.onclick=async()=>{
    const [exId,tId]=el.dataset.topic.split('|');
    const ex=state.exams.find(x=>x.id===exId); if(!ex)return;
    const t=ex.topics.find(x=>x.id===tId); if(!t)return;
    t.done=!t.done; await save(); render();
  });
  document.querySelectorAll('[data-addtopic]').forEach(b=>b.onclick=async()=>{
    const ex=state.exams.find(x=>x.id===b.dataset.addtopic); if(!ex)return;
    const inp=document.querySelector(`[data-topicinput="${ex.id}"]`);
    const t=inp.value.trim(); if(!t)return;
    ex.topics.push({id:uid(),t,done:false});
    await save(); render();
  });
  document.querySelectorAll('[data-delexam]').forEach(b=>b.onclick=async()=>{
    const ex=state.exams.find(x=>x.id===b.dataset.delexam); if(!ex)return;
    if(!confirm(`¿Eliminar la meta "${ex.name}" y su temario?`))return;
    state.exams=state.exams.filter(x=>x.id!==ex.id);
    await save(); render();
  });
  // Datos
  document.querySelectorAll('[data-export]').forEach(b=>b.onclick=exportData);
  const ib=document.querySelector('[data-import]');
  if(ib) ib.onclick=()=>{
    const f=document.getElementById('import-file');
    f.onchange=()=>{ if(f.files[0]) importData(f.files[0]) };
    f.click();
  };
  // Pendientes (tareas de una vez)
  const at=document.querySelector('[data-addtask]');
  if(at) at.onclick=async()=>{
    const txt=document.getElementById('task-text').value.trim();
    if(!txt)return;
    const due=document.getElementById('task-due').value||null;
    state.tasks.push({id:uid(),t:txt,...(due?{due}:{}),done:false});
    await save(); render();
  };
  const tt=document.getElementById('task-text');
  if(tt) tt.onkeydown=e=>{ if(e.key==='Enter') document.querySelector('[data-addtask]').click() };
  document.querySelectorAll('[data-task]').forEach(el=>el.onclick=async()=>{
    const t=state.tasks.find(x=>x.id===el.dataset.task); if(!t)return;
    t.done=!t.done;
    await save(); render();
  });
  const ct=document.querySelector('[data-cleartasks]');
  if(ct) ct.onclick=async e=>{
    e.stopPropagation();
    state.tasks=state.tasks.filter(t=>!t.done);
    await save(); render();
  };
  // Calendario: editar días pasados
  document.querySelectorAll('[data-day]').forEach(el=>el.onclick=()=>openDayModal(el.dataset.day));
  const cp=document.querySelector('[data-calprev]'); if(cp)cp.onclick=()=>{calOffset--;render()};
  const cn=document.querySelector('[data-calnext]'); if(cn)cn.onclick=()=>{if(calOffset<0){calOffset++;render()}};
  const yb=document.querySelector('[data-yesterday]');
  if(yb) yb.onclick=()=>openDayModal(todayKey(addDays(new Date(),-1)));
  const pb=document.querySelector('[data-pickday]');
  if(pb) pb.onclick=()=>{
    const dp=document.getElementById('day-pick');
    dp.onchange=()=>{ if(dp.value && dp.value<=todayKey()) openDayModal(dp.value) };
    try{ dp.showPicker() }catch(e){ dp.click() }
  };
  // Bitácora: búsqueda en vivo
  const bs=document.getElementById('bit-search');
  if(bs) bs.oninput=()=>{ document.getElementById('bit-list').innerHTML=bitacoraListHTML(bs.value.trim()) };
  // Compartir imagen
  const sh=document.querySelector('[data-share]'); if(sh)sh.onclick=shareImage;
}
function esc(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }

load();

// PWA: registrar service worker (solo en https/localhost)
if('serviceWorker' in navigator && location.protocol==='https:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
